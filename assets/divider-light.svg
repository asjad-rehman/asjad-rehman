<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 400 18" width="100%" height="18" role="presentation">
  <defs>
    <linearGradient id="line-l" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#0f766e" stop-opacity="0"/>
      <stop offset="0.18" stop-color="#0f766e" stop-opacity="0.55"/>
      <stop offset="0.5" stop-color="#7c3aed" stop-opacity="0.95"/>
      <stop offset="0.82" stop-color="#0f766e" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#0f766e" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="gem-l" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#5eead4"/>
      <stop offset="0.5" stop-color="#c4b5fd"/>
      <stop offset="1" stop-color="#7dd3fc"/>
    </linearGradient>
    <linearGradient id="drim-l" x1="0" y1="0" x2="0.6" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0.4"/>
      <stop offset="1" stop-color="#7c3aed" stop-opacity="0.4"/>
    </linearGradient>
    <linearGradient id="dtint-l" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.6"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0.35"/>
    </linearGradient>
    <filter id="drefract-l" x="-40%" y="-40%" width="180%" height="180%" color-interpolation-filters="sRGB">
      <feTurbulence type="fractalNoise" baseFrequency="0.04 0.08" numOctaves="2" seed="4" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="5" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <clipPath id="dpill-l"><rect x="156" y="2" width="88" height="14" rx="7"/></clipPath>
  </defs>

  <rect x="0" y="8" width="400" height="2" fill="url(#line-l)"/>
  <circle cx="132" cy="9" r="2" fill="#0f766e" opacity="0.7"/>
  <circle cx="268" cy="9" r="2" fill="#0f766e" opacity="0.7"/>

  <g clip-path="url(#dpill-l)">
    <rect x="156" y="2" width="88" height="14" fill="url(#gem-l)" opacity="0.85" filter="url(#drefract-l)"/>
    <rect x="156" y="2" width="88" height="14" fill="url(#dtint-l)"/>
  </g>
  <rect x="156.5" y="2.5" width="87" height="13" rx="6.5" fill="none" stroke="url(#drim-l)" stroke-width="1"/>
  <circle cx="200" cy="9" r="1.6" fill="#ffffff" opacity="0.95"/>
</svg>
