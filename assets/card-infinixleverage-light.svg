<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 380 120" width="380" height="120" role="img" aria-label="InfinixLeverage">
  <defs>
    <linearGradient id="sky-infinixleveragel" x1="0" y1="0" x2="0.5" y2="1"><stop offset="0" stop-color="#eef3fb"/><stop offset="1" stop-color="#dde5f1"/></linearGradient>
    <radialGradient id="b1-infinixleveragel"><stop offset="0" stop-color="#e879f9" stop-opacity="0.52"/><stop offset="1" stop-color="#e879f9" stop-opacity="0"/></radialGradient>
    <radialGradient id="b2-infinixleveragel"><stop offset="0" stop-color="#fb923c" stop-opacity="0.42"/><stop offset="1" stop-color="#fb923c" stop-opacity="0"/></radialGradient>
    <radialGradient id="b3-infinixleveragel"><stop offset="0" stop-color="#e879f9" stop-opacity="0.42"/><stop offset="1" stop-color="#e879f9" stop-opacity="0"/></radialGradient>
    <g id="scene-infinixleveragel">
      <rect width="380" height="120" fill="url(#sky-infinixleveragel)"/>
      <circle cx="60" cy="80" r="120" fill="url(#b1-infinixleveragel)"/>
      <circle cx="330" cy="30" r="130" fill="url(#b2-infinixleveragel)"/>
      <circle cx="230" cy="110" r="95" fill="url(#b3-infinixleveragel)"/>
    </g>
    <filter id="refract-infinixleveragel" x="-15%" y="-15%" width="130%" height="130%" color-interpolation-filters="sRGB">
      <feTurbulence type="fractalNoise" baseFrequency="0.013 0.019" numOctaves="2" seed="22" result="n"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.1" result="f"/>
      <feDisplacementMap in="f" in2="n" scale="15" xChannelSelector="R" yChannelSelector="G" result="dm"/>
      <feComponentTransfer in="dm"><feFuncR type="linear" slope="1.04" intercept="0.05"/><feFuncG type="linear" slope="1.04" intercept="0.05"/><feFuncB type="linear" slope="1.04" intercept="0.06"/></feComponentTransfer>
    </filter>
    <filter id="sh-infinixleveragel" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#64748b" flood-opacity="0.3"/>
    </filter>
    <clipPath id="panel-infinixleveragel"><rect x="7" y="7" width="366" height="106" rx="20"/></clipPath>
    <clipPath id="ic-infinixleveragel"><circle cx="44" cy="60" r="22"/></clipPath>
    <linearGradient id="tint-infinixleveragel" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#ffffff" stop-opacity="0.55"/><stop offset="0.5" stop-color="#ffffff" stop-opacity="0.34"/><stop offset="1" stop-color="#ffffff" stop-opacity="0.42"/></linearGradient>
    <linearGradient id="rim-infinixleveragel" x1="0" y1="0" x2="0.8" y2="1"><stop offset="0" stop-color="#ffffff" stop-opacity="0.95"/><stop offset="0.45" stop-color="#ffffff" stop-opacity="0.45"/><stop offset="1" stop-color="#c026d3" stop-opacity="0.35"/></linearGradient>
    <linearGradient id="sheen-infinixleveragel" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#fff" stop-opacity="0.5"/><stop offset="0.5" stop-color="#fff" stop-opacity="0"/></linearGradient>
  </defs>

  <use xlink:href="#scene-infinixleveragel" href="#scene-infinixleveragel"/>

  <rect x="7" y="7" width="366" height="106" rx="20" fill="#ffffff" opacity="0.4" filter="url(#sh-infinixleveragel)"/>
  <g clip-path="url(#panel-infinixleveragel)">
    <use xlink:href="#scene-infinixleveragel" href="#scene-infinixleveragel" filter="url(#refract-infinixleveragel)"/>
    <rect x="7" y="7" width="366" height="106" rx="20" fill="url(#tint-infinixleveragel)"/>
    <path d="M7 27 A20 20 0 0 1 27 7 H180 L120 113 H27 A20 20 0 0 1 7 93 Z" fill="url(#sheen-infinixleveragel)"/>
  </g>
  <rect x="7.4" y="8" width="365" height="105" rx="19.6" fill="none" stroke="#c026d3" stroke-opacity="0.16" stroke-width="0.8"/>
  <rect x="7.8" y="7.2" width="364" height="105" rx="19.6" fill="none" stroke="#fb923c" stroke-opacity="0.16" stroke-width="0.8"/>
  <rect x="7.6" y="7.6" width="365" height="105" rx="19.4" fill="none" stroke="url(#rim-infinixleveragel)" stroke-width="1.4"/>

  <!-- icon lens -->
  <g clip-path="url(#ic-infinixleveragel)"><use xlink:href="#scene-infinixleveragel" href="#scene-infinixleveragel" filter="url(#refract-infinixleveragel)"/><circle cx="44" cy="60" r="22" fill="#ffffff" fill-opacity="0.5"/></g>
  <circle cx="44" cy="60" r="22" fill="none" stroke="#c026d3" stroke-opacity="0.28" stroke-width="1.2"/>
  <g transform="translate(32,48)" color="#c026d3">
    <rect x="9" y="4" width="6" height="11" rx="3" fill="currentColor"/>
    <path d="M6 10v1a6 6 0 0 0 12 0v-1" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"/>
    <line x1="12" y1="17" x2="12" y2="20" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
    <line x1="9" y1="20" x2="15" y2="20" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
    <path d="M3 12c0-1.5.5-2.8 1.5-3.8M21 12c0-1.5-.5-2.8-1.5-3.8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/></g>

  <!-- content -->
  <text x="82" y="49" fill="#0f172a" font-family="system-ui,-apple-system,'Segoe UI',Roboto,sans-serif" font-weight="700" font-size="15">InfinixLeverage</text>
  <g>
    <rect x="299" y="39" width="66" height="20" rx="10" fill="#ffffff" fill-opacity="0.55" stroke="#c026d3" stroke-opacity="0.5" stroke-width="1"/>
    <circle cx="313" cy="49" r="2.6" fill="#c026d3"/>
    <text x="322" y="52.5" fill="#c026d3" font-family="system-ui,-apple-system,sans-serif" font-weight="800" font-size="9" letter-spacing="0.5">LIVE</text>
  </g>
  <text x="82" y="72" fill="#475569" font-family="system-ui,-apple-system,sans-serif" font-size="10.5">Voice AI call agents for hospitality &amp;</text>
  <text x="82" y="86" fill="#475569" font-family="system-ui,-apple-system,sans-serif" font-size="10.5">client operations delivery systems.</text>
  <text x="82" y="104" fill="#c026d3" font-family="system-ui,-apple-system,sans-serif" font-size="9.5" font-weight="600">Voice AI · Eval Frameworks · JS · Docker</text>
