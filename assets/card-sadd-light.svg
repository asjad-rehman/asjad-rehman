<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 380 120" width="380" height="120" role="img" aria-label="Sadd">
  <defs>
    <linearGradient id="sky-saddl" x1="0" y1="0" x2="0.5" y2="1"><stop offset="0" stop-color="#eef3fb"/><stop offset="1" stop-color="#dde5f1"/></linearGradient>
    <radialGradient id="b1-saddl"><stop offset="0" stop-color="#818cf8" stop-opacity="0.52"/><stop offset="1" stop-color="#818cf8" stop-opacity="0"/></radialGradient>
    <radialGradient id="b2-saddl"><stop offset="0" stop-color="#22d3ee" stop-opacity="0.42"/><stop offset="1" stop-color="#22d3ee" stop-opacity="0"/></radialGradient>
    <radialGradient id="b3-saddl"><stop offset="0" stop-color="#818cf8" stop-opacity="0.42"/><stop offset="1" stop-color="#818cf8" stop-opacity="0"/></radialGradient>
    <g id="scene-saddl">
      <rect width="380" height="120" fill="url(#sky-saddl)"/>
      <circle cx="60" cy="80" r="120" fill="url(#b1-saddl)"/>
      <circle cx="330" cy="30" r="130" fill="url(#b2-saddl)"/>
      <circle cx="230" cy="110" r="95" fill="url(#b3-saddl)"/>
    </g>
    <filter id="refract-saddl" x="-15%" y="-15%" width="130%" height="130%" color-interpolation-filters="sRGB">
      <feTurbulence type="fractalNoise" baseFrequency="0.013 0.019" numOctaves="2" seed="11" result="n"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.1" result="f"/>
      <feDisplacementMap in="f" in2="n" scale="15" xChannelSelector="R" yChannelSelector="G" result="dm"/>
      <feComponentTransfer in="dm"><feFuncR type="linear" slope="1.04" intercept="0.05"/><feFuncG type="linear" slope="1.04" intercept="0.05"/><feFuncB type="linear" slope="1.04" intercept="0.06"/></feComponentTransfer>
    </filter>
    <filter id="sh-saddl" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#64748b" flood-opacity="0.3"/>
    </filter>
    <clipPath id="panel-saddl"><rect x="7" y="7" width="366" height="106" rx="20"/></clipPath>
    <clipPath id="ic-saddl"><circle cx="44" cy="60" r="22"/></clipPath>
    <linearGradient id="tint-saddl" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#ffffff" stop-opacity="0.55"/><stop offset="0.5" stop-color="#ffffff" stop-opacity="0.34"/><stop offset="1" stop-color="#ffffff" stop-opacity="0.42"/></linearGradient>
    <linearGradient id="rim-saddl" x1="0" y1="0" x2="0.8" y2="1"><stop offset="0" stop-color="#ffffff" stop-opacity="0.95"/><stop offset="0.45" stop-color="#ffffff" stop-opacity="0.45"/><stop offset="1" stop-color="#6366f1" stop-opacity="0.35"/></linearGradient>
    <linearGradient id="sheen-saddl" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#fff" stop-opacity="0.5"/><stop offset="0.5" stop-color="#fff" stop-opacity="0"/></linearGradient>
  </defs>

  <use xlink:href="#scene-saddl" href="#scene-saddl"/>

  <rect x="7" y="7" width="366" height="106" rx="20" fill="#ffffff" opacity="0.4" filter="url(#sh-saddl)"/>
  <g clip-path="url(#panel-saddl)">
    <use xlink:href="#scene-saddl" href="#scene-saddl" filter="url(#refract-saddl)"/>
    <rect x="7" y="7" width="366" height="106" rx="20" fill="url(#tint-saddl)"/>
    <path d="M7 27 A20 20 0 0 1 27 7 H180 L120 113 H27 A20 20 0 0 1 7 93 Z" fill="url(#sheen-saddl)"/>
  </g>
  <rect x="7.4" y="8" width="365" height="105" rx="19.6" fill="none" stroke="#6366f1" stroke-opacity="0.16" stroke-width="0.8"/>
  <rect x="7.8" y="7.2" width="364" height="105" rx="19.6" fill="none" stroke="#22d3ee" stroke-opacity="0.16" stroke-width="0.8"/>
  <rect x="7.6" y="7.6" width="365" height="105" rx="19.4" fill="none" stroke="url(#rim-saddl)" stroke-width="1.4"/>

  <!-- icon lens -->
  <g clip-path="url(#ic-saddl)"><use xlink:href="#scene-saddl" href="#scene-saddl" filter="url(#refract-saddl)"/><circle cx="44" cy="60" r="22" fill="#ffffff" fill-opacity="0.5"/></g>
  <circle cx="44" cy="60" r="22" fill="none" stroke="#6366f1" stroke-opacity="0.28" stroke-width="1.2"/>
  <g transform="translate(32,48)" color="#6366f1">
    <rect x="5" y="2" width="14" height="20" rx="3" fill="none" stroke="currentColor" stroke-width="2"/>
    <line x1="8" y1="5" x2="16" y2="5" stroke="currentColor" stroke-width="1.5"/>
    <circle cx="12" cy="18" r="1.5" fill="currentColor"/>
    <path d="M9 9h6v5H9V9z" fill="currentColor" opacity="0.7"/>
    <path d="M12 7.5v1.5" stroke="currentColor" stroke-width="1"/></g>

  <!-- content -->
  <text x="82" y="49" fill="#0f172a" font-family="system-ui,-apple-system,'Segoe UI',Roboto,sans-serif" font-weight="700" font-size="15">Sadd</text>
  <g>
    <rect x="299" y="39" width="66" height="20" rx="10" fill="#ffffff" fill-opacity="0.55" stroke="#6366f1" stroke-opacity="0.5" stroke-width="1"/>
    <circle cx="313" cy="49" r="2.6" fill="#6366f1"/>
    <text x="322" y="52.5" fill="#6366f1" font-family="system-ui,-apple-system,sans-serif" font-weight="800" font-size="9" letter-spacing="0.5">LIVE</text>
  </g>
  <text x="82" y="72" fill="#475569" font-family="system-ui,-apple-system,sans-serif" font-size="10.5">A focus app built with intention — a</text>
  <text x="82" y="86" fill="#475569" font-family="system-ui,-apple-system,sans-serif" font-size="10.5">deliberate barrier to infinite feeds.</text>
  <text x="82" y="104" fill="#6366f1" font-family="system-ui,-apple-system,sans-serif" font-size="9.5" font-weight="600">SwiftUI · iOS · Supabase · RevenueCat</text>
</svg>
