<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 120" width="380" height="120">
  <defs>
    <linearGradient id="bg-grad-light" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f8fafc" />
      <stop offset="100%" stop-color="#e2e8f0" />
    </linearGradient>
    <radialGradient id="glow" cx="10%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#6b21a8" stop-opacity="0.08" />
      <stop offset="100%" stop-color="#6b21a8" stop-opacity="0" />
    </radialGradient>
  </defs>
  
  <!-- Border & Background -->
  <rect width="380" height="120" rx="8" fill="url(#bg-grad-light)" stroke="#cbd5e1" stroke-width="1" />
  <rect width="380" height="120" rx="8" fill="url(#glow)" />
  
  <!-- Icon Wrapper -->
  <g transform="translate(20, 36)">
    <circle cx="24" cy="24" r="28" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1" />
    <g transform="translate(12, 12)">
      <rect x="5" y="2" width="14" height="20" rx="3" fill="none" stroke="#6b21a8" stroke-width="2" />
                <line x1="8" y1="5" x2="16" y2="5" stroke="#6b21a8" stroke-width="1.5" />
                <circle cx="12" cy="18" r="1.5" fill="#6b21a8" />
                <path d="M9 9h6v5H9V9z" fill="#6b21a8" opacity="0.7" />
                <path d="M12 7.5v1.5" stroke="#6b21a8" stroke-width="1" />
    </g>
  </g>

  <!-- Content -->
  <g transform="translate(88, 20)">
    <!-- Title -->
    <text x="0" y="15" fill="#0f172a" font-family="system-ui, -apple-system, sans-serif" font-weight="700" font-size="15">Sadd</text>
    
    <!-- Tag -->
    <g transform="translate(210, 0)">
      <rect width="60" height="18" rx="3" fill="#f1f5f9" stroke="#6b21a8" stroke-width="1" />
      <text x="30" y="12" fill="#6b21a8" font-family="system-ui, -apple-system, sans-serif" font-weight="800" font-size="9" text-anchor="middle">LIVE</text>
    </g>
    
    <!-- Description -->
    <foreignObject x="0" y="26" width="270" height="42">
      <div xmlns="http://www.w3.org/1999/xhtml" style="color: #475569; font-family: system-ui, -apple-system, sans-serif; font-size: 11px; line-height: 1.35; max-height: 38px; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;">
        A focus app built with intention, a deliberate barrier to infinite feeds.
      </div>
    </foreignObject>
    
    <!-- Tech Stack -->
    <text x="0" y="85" fill="#6b21a8" font-family="system-ui, -apple-system, sans-serif" font-size="9.5" font-weight="600" opacity="0.95">SwiftUI · iOS · Supabase · RevenueCat</text>
  </g>
