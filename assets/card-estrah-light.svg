<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 380 120" width="380" height="120" role="img" aria-label="Estrah">
  <defs>
    <linearGradient id="sky-estrahl" x1="0" y1="0" x2="0.5" y2="1"><stop offset="0" stop-color="#eef3fb"/><stop offset="1" stop-color="#dde5f1"/></linearGradient>
    <radialGradient id="b1-estrahl"><stop offset="0" stop-color="#34d399" stop-opacity="0.52"/><stop offset="1" stop-color="#34d399" stop-opacity="0"/></radialGradient>
    <radialGradient id="b2-estrahl"><stop offset="0" stop-color="#fbbf24" stop-opacity="0.42"/><stop offset="1" stop-color="#fbbf24" stop-opacity="0"/></radialGradient>
    <radialGradient id="b3-estrahl"><stop offset="0" stop-color="#34d399" stop-opacity="0.42"/><stop offset="1" stop-color="#34d399" stop-opacity="0"/></radialGradient>
    <g id="scene-estrahl">
      <rect width="380" height="120" fill="url(#sky-estrahl)"/>
      <circle cx="60" cy="80" r="120" fill="url(#b1-estrahl)"/>
      <circle cx="330" cy="30" r="130" fill="url(#b2-estrahl)"/>
      <circle cx="230" cy="110" r="95" fill="url(#b3-estrahl)"/>
    </g>
    <filter id="refract-estrahl" x="-15%" y="-15%" width="130%" height="130%" color-interpolation-filters="sRGB">
      <feTurbulence type="fractalNoise" baseFrequency="0.013 0.019" numOctaves="2" seed="13" result="n"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.1" result="f"/>
      <feDisplacementMap in="f" in2="n" scale="15" xChannelSelector="R" yChannelSelector="G" result="dm"/>
      <feComponentTransfer in="dm"><feFuncR type="linear" slope="1.04" intercept="0.05"/><feFuncG type="linear" slope="1.04" intercept="0.05"/><feFuncB type="linear" slope="1.04" intercept="0.06"/></feComponentTransfer>
    </filter>
    <filter id="sh-estrahl" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#64748b" flood-opacity="0.3"/>
    </filter>
    <clipPath id="panel-estrahl"><rect x="7" y="7" width="366" height="106" rx="20"/></clipPath>
    <clipPath id="ic-estrahl"><circle cx="44" cy="60" r="22"/></clipPath>
    <linearGradient id="tint-estrahl" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#ffffff" stop-opacity="0.55"/><stop offset="0.5" stop-color="#ffffff" stop-opacity="0.34"/><stop offset="1" stop-color="#ffffff" stop-opacity="0.42"/></linearGradient>
    <linearGradient id="rim-estrahl" x1="0" y1="0" x2="0.8" y2="1"><stop offset="0" stop-color="#ffffff" stop-opacity="0.95"/><stop offset="0.45" stop-color="#ffffff" stop-opacity="0.45"/><stop offset="1" stop-color="#059669" stop-opacity="0.35"/></linearGradient>
    <linearGradient id="sheen-estrahl" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#fff" stop-opacity="0.5"/><stop offset="0.5" stop-color="#fff" stop-opacity="0"/></linearGradient>
  </defs>

  <use xlink:href="#scene-estrahl" href="#scene-estrahl"/>

  <rect x="7" y="7" width="366" height="106" rx="20" fill="#ffffff" opacity="0.4" filter="url(#sh-estrahl)"/>
  <g clip-path="url(#panel-estrahl)">
    <use xlink:href="#scene-estrahl" href="#scene-estrahl" filter="url(#refract-estrahl)"/>
    <rect x="7" y="7" width="366" height="106" rx="20" fill="url(#tint-estrahl)"/>
    <path d="M7 27 A20 20 0 0 1 27 7 H180 L120 113 H27 A20 20 0 0 1 7 93 Z" fill="url(#sheen-estrahl)"/>
  </g>
  <rect x="7.4" y="8" width="365" height="105" rx="19.6" fill="none" stroke="#059669" stroke-opacity="0.16" stroke-width="0.8"/>
  <rect x="7.8" y="7.2" width="364" height="105" rx="19.6" fill="none" stroke="#fbbf24" stroke-opacity="0.16" stroke-width="0.8"/>
  <rect x="7.6" y="7.6" width="365" height="105" rx="19.4" fill="none" stroke="url(#rim-estrahl)" stroke-width="1.4"/>

  <!-- icon lens -->
  <g clip-path="url(#ic-estrahl)"><use xlink:href="#scene-estrahl" href="#scene-estrahl" filter="url(#refract-estrahl)"/><circle cx="44" cy="60" r="22" fill="#ffffff" fill-opacity="0.5"/></g>
  <circle cx="44" cy="60" r="22" fill="none" stroke="#059669" stroke-opacity="0.28" stroke-width="1.2"/>
  <g transform="translate(32,48)" color="#059669">
    <path d="M12 6C10.5 4.5 8 5.5 8 7.5C8 9.5 9.5 10.5 12 12C14.5 10.5 16 9.5 16 7.5C16 5.5 13.5 4.5 12 6Z" fill="currentColor"/>
    <path d="M8 12.5C6.5 11 4 12 4 14C4 16 5.5 17 8 18.5C10.5 17 12 16 12 14C12 12 9.5 11 8 12.5Z" fill="currentColor" opacity="0.8"/>
    <path d="M16 12.5C14.5 11 12 12 12 14C12 16 13.5 17 16 18.5C18.5 17 20 16 20 14C20 12 17.5 11 16 12.5Z" fill="currentColor" opacity="0.8"/>
    <path d="M12 18.5V21" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></g>

  <!-- content -->
  <text x="82" y="49" fill="#0f172a" font-family="system-ui,-apple-system,'Segoe UI',Roboto,sans-serif" font-weight="700" font-size="15">Estrah</text>
  <g>
    <rect x="299" y="39" width="66" height="20" rx="10" fill="#ffffff" fill-opacity="0.55" stroke="#059669" stroke-opacity="0.5" stroke-width="1"/>
    <circle cx="313" cy="49" r="2.6" fill="#059669"/>
    <text x="322" y="52.5" fill="#059669" font-family="system-ui,-apple-system,sans-serif" font-weight="800" font-size="9" letter-spacing="0.5">ACTIVE</text>
  </g>
  <text x="82" y="72" fill="#475569" font-family="system-ui,-apple-system,sans-serif" font-size="10.5">GOTS-certified organic cotton, vertically</text>
  <text x="82" y="86" fill="#475569" font-family="system-ui,-apple-system,sans-serif" font-size="10.5">manufactured. Retail &amp; wholesale.</text>
  <text x="82" y="104" fill="#059669" font-family="system-ui,-apple-system,sans-serif" font-size="9.5" font-weight="600">Next.js · Supabase · Stripe · PostgreSQL</text>
</svg>
