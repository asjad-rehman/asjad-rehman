<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 250" width="100%" height="100%">
  <defs>
    <linearGradient id="bg-grad-dark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#05070c" />
      <stop offset="50%" stop-color="#0a0f1d" />
      <stop offset="100%" stop-color="#141a29" />
    </linearGradient>
    <linearGradient id="cyan-violet-dark" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2dd4bf" />
      <stop offset="100%" stop-color="#c084fc" />
    </linearGradient>
    <radialGradient id="glow-dark" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0" />
    </radialGradient>
  </defs>

  <style>
    @keyframes pulse {
      0% { r: 3px; opacity: 0.4; }
      50% { r: 6px; opacity: 0.8; }
      100% { r: 3px; opacity: 0.4; }
    }
    @keyframes pulse-large {
      0% { r: 5px; opacity: 0.6; }
      50% { r: 10px; opacity: 1.0; }
      100% { r: 5px; opacity: 0.6; }
    }
    @keyframes dash {
      to {
        stroke-dashoffset: -40;
      }
    }
    @keyframes float {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-5px); }
      100% { transform: translateY(0px); }
    }
    .node {
      animation: pulse 3s infinite ease-in-out;
    }
    .node-large {
      animation: pulse-large 4s infinite ease-in-out;
    }
    .swarm-line {
      stroke-dasharray: 6 4;
      animation: dash 3s linear infinite;
    }
    .animated-graphic {
      animation: float 6s infinite ease-in-out;
    }
    .title-text {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Inter", sans-serif;
      font-weight: 800;
      letter-spacing: 2px;
    }
    .subtitle-text {
      font-family: "Fira Code", "Courier New", Courier, monospace;
      font-weight: 600;
      letter-spacing: 4px;
      font-size: 12px;
    }
    .tagline-text {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Inter", sans-serif;
      font-size: 13px;
      fill: #94a3b8;
    }
  </style>

  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bg-grad-dark)" rx="8" />

  <!-- Subtly Textured Grid -->
  <g stroke="#38bdf8" stroke-width="0.5" opacity="0.05">
    <path d="M 0,25 L 800,25 M 0,50 L 800,50 M 0,75 L 800,75 M 0,100 L 800,100 M 0,125 L 800,125 M 0,150 L 800,150 M 0,175 L 800,175 M 0,200 L 800,200 M 0,225 L 800,225" />
    <path d="M 50,0 L 50,250 M 100,0 L 100,250 M 150,0 L 150,250 M 200,0 L 200,250 M 250,0 L 250,250 M 300,0 L 300,250 M 350,0 L 350,250 M 400,0 L 400,250 M 450,0 L 450,250 M 500,0 L 500,250 M 550,0 L 550,250 M 600,0 L 600,250 M 650,0 L 650,250 M 700,0 L 700,250 M 750,0 L 750,250" />
  </g>

  <!-- Swarm Ambient Glow -->
  <circle cx="640" cy="125" r="120" fill="url(#glow-dark)" />

  <!-- Text Content -->
  <g transform="translate(50, 0)">
    <!-- Main Fullname -->
    <text x="0" y="105" fill="url(#cyan-violet-dark)" font-size="30" class="title-text">MUHAMMAD ASJAD REHMAN</text>
    
    <!-- Subtitle / Focus domains -->
    <text x="0" y="145" fill="#f8fafc" class="subtitle-text">SYSTEMS &amp; ALGORITHMIC DEFENSE</text>
    
    <!-- Tagline -->
    <text x="0" y="185" class="tagline-text">Building resilient autonomous systems and ethical technology.</text>
  </g>

  <!-- Autonomous Swarm Graphic (Right Side) -->
  <g class="animated-graphic" opacity="0.85">
    <!-- Lines / Connections -->
    <line x1="600" y1="60" x2="700" y2="100" stroke="#a855f7" stroke-width="1.5" opacity="0.3" />
    <line x1="600" y1="60" x2="520" y2="110" stroke="#38bdf8" stroke-width="1.5" opacity="0.3" />
    <line x1="700" y1="100" x2="740" y2="140" stroke="#38bdf8" stroke-width="1.5" opacity="0.3" />
    <line x1="520" y1="110" x2="580" y2="160" stroke="#a855f7" stroke-width="1.5" opacity="0.3" />
    <line x1="580" y1="160" x2="680" y2="200" stroke="#38bdf8" stroke-width="1.5" opacity="0.3" />
    <line x1="680" y1="200" x2="740" y2="140" stroke="#a855f7" stroke-width="1.5" opacity="0.3" />
    <line x1="700" y1="100" x2="680" y2="200" stroke="#2dd4bf" stroke-dasharray="4 2" stroke-width="1" opacity="0.4" />
    
    <!-- Center Hub connections (Dotted active tracking) -->
    <line x1="640" y1="125" x2="600" y2="60" stroke="#2dd4bf" stroke-width="1.5" class="swarm-line" opacity="0.6" />
    <line x1="640" y1="125" x2="700" y2="100" stroke="#2dd4bf" stroke-width="1.5" class="swarm-line" opacity="0.6" />
    <line x1="640" y1="125" x2="580" y2="160" stroke="#2dd4bf" stroke-width="1.5" class="swarm-line" opacity="0.6" />
    <line x1="640" y1="125" x2="680" y2="200" stroke="#2dd4bf" stroke-width="1.5" class="swarm-line" opacity="0.6" />

    <!-- Node Points -->
    <circle cx="600" cy="60" r="4" fill="#a855f7" class="node" style="animation-delay: 0.5s;" />
    <circle cx="700" cy="100" r="4" fill="#38bdf8" class="node" style="animation-delay: 1s;" />
    <circle cx="740" cy="140" r="4" fill="#a855f7" class="node" style="animation-delay: 1.5s;" />
    <circle cx="680" cy="200" r="4" fill="#38bdf8" class="node" style="animation-delay: 2s;" />
    <circle cx="580" cy="160" r="4" fill="#a855f7" class="node" style="animation-delay: 2.5s;" />
    <circle cx="520" cy="110" r="4" fill="#38bdf8" class="node" style="animation-delay: 0s;" />

    <!-- Central Target Swarm Hub -->
    <circle cx="640" cy="125" r="7" fill="#2dd4bf" class="node-large" />
    <circle cx="640" cy="125" r="14" fill="none" stroke="#2dd4bf" stroke-width="1" opacity="0.3" />
  </g>
</svg>
