<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 800 250" width="100%" height="100%" role="img" aria-label="Muhammad Asjad Rehman Hashmi">
  <defs>
    <!-- ===== Aurora background palette ===== -->
    <linearGradient id="sky-d" x1="0" y1="0" x2="0.4" y2="1">
      <stop offset="0" stop-color="#05070c"/>
      <stop offset="0.55" stop-color="#080d19"/>
      <stop offset="1" stop-color="#0b1222"/>
    </linearGradient>
    <radialGradient id="blob-teal-d"><stop offset="0" stop-color="#2dd4bf" stop-opacity="0.85"/><stop offset="1" stop-color="#2dd4bf" stop-opacity="0"/></radialGradient>
    <radialGradient id="blob-violet-d"><stop offset="0" stop-color="#c084fc" stop-opacity="0.8"/><stop offset="1" stop-color="#c084fc" stop-opacity="0"/></radialGradient>
    <radialGradient id="blob-blue-d"><stop offset="0" stop-color="#3b82f6" stop-opacity="0.7"/><stop offset="1" stop-color="#3b82f6" stop-opacity="0"/></radialGradient>
    <radialGradient id="blob-gold-d"><stop offset="0" stop-color="#f59e0b" stop-opacity="0.55"/><stop offset="1" stop-color="#f59e0b" stop-opacity="0"/></radialGradient>
    <radialGradient id="blob-pink-d"><stop offset="0" stop-color="#f472b6" stop-opacity="0.5"/><stop offset="1" stop-color="#f472b6" stop-opacity="0"/></radialGradient>

    <!-- The refracting scene, reused inside the glass -->
    <g id="scene-d">
      <rect width="800" height="250" fill="url(#sky-d)"/>
      <circle cx="150" cy="150" r="170" fill="url(#blob-teal-d)"/>
      <circle cx="650" cy="90"  r="185" fill="url(#blob-violet-d)"/>
      <circle cx="430" cy="215" r="155" fill="url(#blob-blue-d)"/>
      <circle cx="725" cy="205" r="120" fill="url(#blob-gold-d)"/>
      <circle cx="300" cy="35"  r="120" fill="url(#blob-pink-d)"/>
      <circle cx="505" cy="120" r="95"  fill="url(#blob-teal-d)"/>
    </g>

    <!-- ===== Liquid-glass refraction ===== -->
    <filter id="refract-d" x="-15%" y="-15%" width="130%" height="130%" color-interpolation-filters="sRGB">
      <feTurbulence type="fractalNoise" baseFrequency="0.011 0.016" numOctaves="2" seed="11" result="noise"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.5" result="frost"/>
      <feDisplacementMap in="frost" in2="noise" scale="26" xChannelSelector="R" yChannelSelector="G" result="disp"/>
      <feComponentTransfer in="disp">
        <feFuncR type="linear" slope="1.12" intercept="0.02"/>
        <feFuncG type="linear" slope="1.12" intercept="0.02"/>
        <feFuncB type="linear" slope="1.15" intercept="0.03"/>
      </feComponentTransfer>
    </filter>
    <filter id="shadow-d" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#01030a" flood-opacity="0.55"/>
    </filter>

    <clipPath id="clip-panel-d"><rect x="40" y="40" width="720" height="170" rx="34"/></clipPath>
    <clipPath id="clip-pill1-d"><rect x="248" y="60" width="96" height="30" rx="15"/></clipPath>
    <clipPath id="clip-pill2-d"><rect x="352" y="60" width="96" height="30" rx="15"/></clipPath>
    <clipPath id="clip-pill3-d"><rect x="456" y="60" width="96" height="30" rx="15"/></clipPath>

    <linearGradient id="sheen-d" x1="0" y1="0" x2="1" y2="0.5">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="tint-d" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.15"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0.04"/>
      <stop offset="1" stop-color="#0b1020" stop-opacity="0.12"/>
    </linearGradient>
    <linearGradient id="rim-d" x1="0" y1="0" x2="0.8" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.9"/>
      <stop offset="0.4" stop-color="#ffffff" stop-opacity="0.22"/>
      <stop offset="0.7" stop-color="#7dd3fc" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#c084fc" stop-opacity="0.38"/>
    </linearGradient>

    <style>
      .name-d{font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Inter",sans-serif;font-weight:800;letter-spacing:1.5px;}
      .sub-d{font-family:"Fira Code","Courier New",monospace;font-weight:600;letter-spacing:2.5px;font-size:11px;}
      .tag-d{font-family:system-ui,-apple-system,sans-serif;font-size:12px;}
      .pill-d{font-family:system-ui,-apple-system,sans-serif;font-weight:600;font-size:12px;}
      .float-d{animation:floatY 7s ease-in-out infinite;transform-box:fill-box;transform-origin:center;}
      .sweep-d{animation:sweep 8.5s ease-in-out infinite;}
      @keyframes floatY{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
      @keyframes sweep{0%{transform:translateX(-360px)}55%,100%{transform:translateX(430px)}}
    </style>
  </defs>

  <!-- crisp aurora behind everything -->
  <use xlink:href="#scene-d" href="#scene-d"/>
  <rect width="800" height="250" fill="#05070c" opacity="0.10"/>

  <g class="float-d">
    <!-- drop shadow silhouette -->
    <rect x="40" y="40" width="720" height="170" rx="34" fill="#04060b" opacity="0.5" filter="url(#shadow-d)"/>

    <!-- refracted glass interior -->
    <g clip-path="url(#clip-panel-d)">
      <use xlink:href="#scene-d" href="#scene-d" filter="url(#refract-d)"/>
      <rect x="40" y="40" width="720" height="170" rx="34" fill="url(#tint-d)"/>
      <rect class="sweep-d" x="40" y="40" width="200" height="170" fill="url(#sheen-d)"/>
    </g>

    <!-- rim / edge light + chromatic fringe -->
    <rect x="40.4" y="41.2" width="719" height="169" rx="33.6" fill="none" stroke="#38bdf8" stroke-opacity="0.18" stroke-width="0.8"/>
    <rect x="40.9" y="40.2" width="718" height="169" rx="33.6" fill="none" stroke="#e879f9" stroke-opacity="0.16" stroke-width="0.8"/>
    <rect x="40.75" y="40.75" width="718.5" height="168.5" rx="33.4" fill="none" stroke="url(#rim-d)" stroke-width="1.5"/>
    <rect x="42.5" y="42.5" width="715" height="165" rx="32" fill="none" stroke="#ffffff" stroke-opacity="0.06" stroke-width="1"/>

    <!-- ===== glass nav pills (echo of the reference nav) ===== -->
    <g class="pill-d">
      <g clip-path="url(#clip-pill1-d)"><use xlink:href="#scene-d" href="#scene-d" filter="url(#refract-d)"/><rect x="248" y="60" width="96" height="30" rx="15" fill="#ffffff" fill-opacity="0.10"/></g>
      <rect x="248" y="60" width="96" height="30" rx="15" fill="none" stroke="#ffffff" stroke-opacity="0.35" stroke-width="1"/>
      <text x="288" y="79" fill="#e8f0ff" text-anchor="middle">Ventures</text>
      <path d="M320 73 l4 4 l4 -4" fill="none" stroke="#7dd3fc" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>

      <g clip-path="url(#clip-pill2-d)"><use xlink:href="#scene-d" href="#scene-d" filter="url(#refract-d)"/><rect x="352" y="60" width="96" height="30" rx="15" fill="#ffffff" fill-opacity="0.10"/></g>
      <rect x="352" y="60" width="96" height="30" rx="15" fill="none" stroke="#ffffff" stroke-opacity="0.35" stroke-width="1"/>
      <text x="400" y="79" fill="#e8f0ff" text-anchor="middle">Research</text>

      <g clip-path="url(#clip-pill3-d)"><use xlink:href="#scene-d" href="#scene-d" filter="url(#refract-d)"/><rect x="456" y="60" width="96" height="30" rx="15" fill="#ffffff" fill-opacity="0.10"/></g>
      <rect x="456" y="60" width="96" height="30" rx="15" fill="none" stroke="#ffffff" stroke-opacity="0.35" stroke-width="1"/>
      <text x="496" y="79" fill="#e8f0ff" text-anchor="middle">Connect</text>
      <path d="M528 73 l4 4 l4 -4" fill="none" stroke="#c084fc" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
    </g>

    <!-- ===== identity ===== -->
    <text x="400" y="147" text-anchor="middle" class="name-d" font-size="31" fill="#f4f8ff">MUHAMMAD ASJAD REHMAN</text>
    <text x="400" y="173" text-anchor="middle" class="sub-d" fill="#7dd3fc">AUTONOMOUS SYSTEMS &#183; ETHICAL SUPPLY CHAINS &#183; FAITH-CENTERED SOFTWARE</text>
    <text x="400" y="195" text-anchor="middle" class="tag-d" fill="#94a3b8">Three ventures built from zero &#8212; securely, cleanly, and consciously.</text>
  </g>
</svg>
