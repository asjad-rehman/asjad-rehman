    <radialGradient id="b1-infinixleveraged"><stop offset="0" stop-color="#e879f9" stop-opacity="0.8"/><stop offset="1" stop-color="#e879f9" stop-opacity="0"/></radialGradient>
    <radialGradient id="b2-infinixleveraged"><stop offset="0" stop-color="#fb923c" stop-opacity="0.62"/><stop offset="1" stop-color="#fb923c" stop-opacity="0"/></radialGradient>
