<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 380 120" width="380" height="120" role="img" aria-label="AegisSwarm">
  <defs>
    <linearGradient id="sky-aegisswarmd" x1="0" y1="0" x2="0.5" y2="1"><stop offset="0" stop-color="#070c16"/><stop offset="1" stop-color="#0e1526"/></linearGradient>
    <radialGradient id="b1-aegisswarmd"><stop offset="0" stop-color="#2dd4bf" stop-opacity="0.8"/><stop offset="1" stop-color="#2dd4bf" stop-opacity="0"/></radialGradient>
    <radialGradient id="b2-aegisswarmd"><stop offset="0" stop-color="#38bdf8" stop-opacity="0.62"/><stop offset="1" stop-color="#38bdf8" stop-opacity="0"/></radialGradient>
    <radialGradient id="b3-aegisswarmd"><stop offset="0" stop-color="#2dd4bf" stop-opacity="0.62"/><stop offset="1" stop-color="#2dd4bf" stop-opacity="0"/></radialGradient>
    <g id="scene-aegisswarmd">
      <rect width="380" height="120" fill="url(#sky-aegisswarmd)"/>
      <circle cx="60" cy="80" r="120" fill="url(#b1-aegisswarmd)"/>
      <circle cx="330" cy="30" r="130" fill="url(#b2-aegisswarmd)"/>
      <circle cx="230" cy="110" r="95" fill="url(#b3-aegisswarmd)"/>
    </g>
    <filter id="refract-aegisswarmd" x="-15%" y="-15%" width="130%" height="130%" color-interpolation-filters="sRGB">
      <feTurbulence type="fractalNoise" baseFrequency="0.013 0.019" numOctaves="2" seed="17" result="n"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.1" result="f"/>
      <feDisplacementMap in="f" in2="n" scale="15" xChannelSelector="R" yChannelSelector="G" result="dm"/>
      <feComponentTransfer in="dm"><feFuncR type="linear" slope="1.10" intercept="0.02"/><feFuncG type="linear" slope="1.10" intercept="0.02"/><feFuncB type="linear" slope="1.12" intercept="0.03"/></feComponentTransfer>
    </filter>
    <filter id="sh-aegisswarmd" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#01030a" flood-opacity="0.5"/>
    </filter>
    <clipPath id="panel-aegisswarmd"><rect x="7" y="7" width="366" height="106" rx="20"/></clipPath>
    <clipPath id="ic-aegisswarmd"><circle cx="44" cy="60" r="22"/></clipPath>
    <linearGradient id="tint-aegisswarmd" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#ffffff" stop-opacity="0.13"/><stop offset="0.5" stop-color="#ffffff" stop-opacity="0.035"/><stop offset="1" stop-color="#0b1020" stop-opacity="0.10"/></linearGradient>
    <linearGradient id="rim-aegisswarmd" x1="0" y1="0" x2="0.8" y2="1"><stop offset="0" stop-color="#ffffff" stop-opacity="0.85"/><stop offset="0.45" stop-color="#ffffff" stop-opacity="0.18"/><stop offset="1" stop-color="#38bdf8" stop-opacity="0.42"/></linearGradient>
    <linearGradient id="sheen-aegisswarmd" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#fff" stop-opacity="0.14"/><stop offset="0.5" stop-color="#fff" stop-opacity="0"/></linearGradient>
  </defs>

  <use xlink:href="#scene-aegisswarmd" href="#scene-aegisswarmd"/>

  <rect x="7" y="7" width="366" height="106" rx="20" fill="#04060b" opacity="0.4" filter="url(#sh-aegisswarmd)"/>
  <g clip-path="url(#panel-aegisswarmd)">
    <use xlink:href="#scene-aegisswarmd" href="#scene-aegisswarmd" filter="url(#refract-aegisswarmd)"/>
    <rect x="7" y="7" width="366" height="106" rx="20" fill="url(#tint-aegisswarmd)"/>
    <path d="M7 27 A20 20 0 0 1 27 7 H180 L120 113 H27 A20 20 0 0 1 7 93 Z" fill="url(#sheen-aegisswarmd)"/>
  </g>
  <rect x="7.4" y="8" width="365" height="105" rx="19.6" fill="none" stroke="#2dd4bf" stroke-opacity="0.20" stroke-width="0.8"/>
  <rect x="7.8" y="7.2" width="364" height="105" rx="19.6" fill="none" stroke="#38bdf8" stroke-opacity="0.18" stroke-width="0.8"/>
  <rect x="7.6" y="7.6" width="365" height="105" rx="19.4" fill="none" stroke="url(#rim-aegisswarmd)" stroke-width="1.4"/>

  <!-- icon lens -->
  <g clip-path="url(#ic-aegisswarmd)"><use xlink:href="#scene-aegisswarmd" href="#scene-aegisswarmd" filter="url(#refract-aegisswarmd)"/><circle cx="44" cy="60" r="22" fill="#2dd4bf" fill-opacity="0.14"/></g>
  <circle cx="44" cy="60" r="22" fill="none" stroke="#ffffff" stroke-opacity="0.28" stroke-width="1.2"/>
  <g transform="translate(32,48)" color="#2dd4bf">
    <path d="M12 2L9 6H15L12 2Z" fill="currentColor"/>
    <path d="M4 14C4 11.8 5.8 10 8 10H16C18.2 10 20 11.8 20 14V16H4V14Z" fill="currentColor" opacity="0.85"/>
    <circle cx="8" cy="18" r="2" fill="currentColor"/><circle cx="16" cy="18" r="2" fill="currentColor"/>
    <line x1="8" y1="10" x2="6" y2="7" stroke="currentColor" stroke-width="1.5"/>
    <line x1="16" y1="10" x2="18" y2="7" stroke="currentColor" stroke-width="1.5"/>
    <circle cx="6" cy="7" r="1.5" fill="currentColor"/><circle cx="18" cy="7" r="1.5" fill="currentColor"/></g>

  <!-- content -->
  <text x="82" y="49" fill="#f4f8ff" font-family="system-ui,-apple-system,'Segoe UI',Roboto,sans-serif" font-weight="700" font-size="15">AegisSwarm</text>
  <g>
    <rect x="299" y="39" width="66" height="20" rx="10" fill="#ffffff" fill-opacity="0.10" stroke="#2dd4bf" stroke-opacity="0.55" stroke-width="1"/>
    <circle cx="313" cy="49" r="2.6" fill="#2dd4bf"/>
    <text x="322" y="52.5" fill="#2dd4bf" font-family="system-ui,-apple-system,sans-serif" font-weight="800" font-size="9" letter-spacing="0.5">ACTIVE</text>
  </g>
  <text x="82" y="72" fill="#9aa7b8" font-family="system-ui,-apple-system,sans-serif" font-size="10.5">Autonomous swarm defense — distributed,</text>
  <text x="82" y="86" fill="#9aa7b8" font-family="system-ui,-apple-system,sans-serif" font-size="10.5">human-in-the-loop response systems.</text>
  <text x="82" y="104" fill="#2dd4bf" font-family="system-ui,-apple-system,sans-serif" font-size="9.5" font-weight="600">Python · YOLOv8 · OpenCV · FastAPI · AWS</text>
</svg>
