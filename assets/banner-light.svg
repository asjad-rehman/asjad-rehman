<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 800 250" width="100%" height="100%" role="img" aria-label="Muhammad Asjad Rehman Hashmi">
  <defs>
    <linearGradient id="sky-l" x1="0" y1="0" x2="0.4" y2="1">
      <stop offset="0" stop-color="#eef3fb"/>
      <stop offset="0.55" stop-color="#e6ecf6"/>
      <stop offset="1" stop-color="#dbe4f0"/>
    </linearGradient>
    <radialGradient id="blob-teal-l"><stop offset="0" stop-color="#2dd4bf" stop-opacity="0.7"/><stop offset="1" stop-color="#2dd4bf" stop-opacity="0"/></radialGradient>
    <radialGradient id="blob-violet-l"><stop offset="0" stop-color="#a855f7" stop-opacity="0.62"/><stop offset="1" stop-color="#a855f7" stop-opacity="0"/></radialGradient>
    <radialGradient id="blob-blue-l"><stop offset="0" stop-color="#60a5fa" stop-opacity="0.6"/><stop offset="1" stop-color="#60a5fa" stop-opacity="0"/></radialGradient>
    <radialGradient id="blob-gold-l"><stop offset="0" stop-color="#fbbf24" stop-opacity="0.5"/><stop offset="1" stop-color="#fbbf24" stop-opacity="0"/></radialGradient>
    <radialGradient id="blob-pink-l"><stop offset="0" stop-color="#fb7185" stop-opacity="0.45"/><stop offset="1" stop-color="#fb7185" stop-opacity="0"/></radialGradient>

    <g id="scene-l">
      <rect width="800" height="250" fill="url(#sky-l)"/>
      <circle cx="150" cy="150" r="175" fill="url(#blob-teal-l)"/>
      <circle cx="650" cy="90"  r="190" fill="url(#blob-violet-l)"/>
      <circle cx="430" cy="215" r="160" fill="url(#blob-blue-l)"/>
      <circle cx="725" cy="205" r="120" fill="url(#blob-gold-l)"/>
      <circle cx="300" cy="35"  r="120" fill="url(#blob-pink-l)"/>
      <circle cx="505" cy="120" r="95"  fill="url(#blob-teal-l)"/>
    </g>

    <filter id="refract-l" x="-15%" y="-15%" width="130%" height="130%" color-interpolation-filters="sRGB">
      <feTurbulence type="fractalNoise" baseFrequency="0.011 0.016" numOctaves="2" seed="11" result="noise"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.5" result="frost"/>
      <feDisplacementMap in="frost" in2="noise" scale="26" xChannelSelector="R" yChannelSelector="G" result="disp"/>
      <feComponentTransfer in="disp">
        <feFuncR type="linear" slope="1.05" intercept="0.05"/>
        <feFuncG type="linear" slope="1.05" intercept="0.05"/>
        <feFuncB type="linear" slope="1.05" intercept="0.06"/>
      </feComponentTransfer>
    </filter>
    <filter id="shadow-l" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#64748b" flood-opacity="0.35"/>
    </filter>

    <clipPath id="clip-panel-l"><rect x="40" y="40" width="720" height="170" rx="34"/></clipPath>
    <clipPath id="clip-pill1-l"><rect x="248" y="60" width="96" height="30" rx="15"/></clipPath>
    <clipPath id="clip-pill2-l"><rect x="352" y="60" width="96" height="30" rx="15"/></clipPath>
    <clipPath id="clip-pill3-l"><rect x="456" y="60" width="96" height="30" rx="15"/></clipPath>

    <linearGradient id="sheen-l" x1="0" y1="0" x2="1" y2="0.5">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="tint-l" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.55"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0.34"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0.42"/>
    </linearGradient>
    <linearGradient id="rim-l" x1="0" y1="0" x2="0.8" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="0.4" stop-color="#ffffff" stop-opacity="0.5"/>
      <stop offset="0.7" stop-color="#0ea5e9" stop-opacity="0.25"/>
      <stop offset="1" stop-color="#a855f7" stop-opacity="0.4"/>
    </linearGradient>

    <style>
      .name-l{font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Inter",sans-serif;font-weight:800;letter-spacing:1.5px;}
      .sub-l{font-family:"Fira Code","Courier New",monospace;font-weight:600;letter-spacing:2.5px;font-size:11px;}
      .tag-l{font-family:system-ui,-apple-system,sans-serif;font-size:12px;}
      .pill-l{font-family:system-ui,-apple-system,sans-serif;font-weight:600;font-size:12px;}
      .float-l{animation:floatY 7s ease-in-out infinite;transform-box:fill-box;transform-origin:center;}
      .sweep-l{animation:sweep 8.5s ease-in-out infinite;}
      @keyframes floatY{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
      @keyframes sweep{0%{transform:translateX(-360px)}55%,100%{transform:translateX(430px)}}
    </style>
  </defs>

  <use xlink:href="#scene-l" href="#scene-l"/>

  <g class="float-l">
    <rect x="40" y="40" width="720" height="170" rx="34" fill="#ffffff" opacity="0.5" filter="url(#shadow-l)"/>

    <g clip-path="url(#clip-panel-l)">
      <use xlink:href="#scene-l" href="#scene-l" filter="url(#refract-l)"/>
      <rect x="40" y="40" width="720" height="170" rx="34" fill="url(#tint-l)"/>
      <rect class="sweep-l" x="40" y="40" width="200" height="170" fill="url(#sheen-l)"/>
    </g>

    <rect x="40.4" y="41.2" width="719" height="169" rx="33.6" fill="none" stroke="#0ea5e9" stroke-opacity="0.16" stroke-width="0.8"/>
    <rect x="40.9" y="40.2" width="718" height="169" rx="33.6" fill="none" stroke="#d946ef" stroke-opacity="0.14" stroke-width="0.8"/>
    <rect x="40.75" y="40.75" width="718.5" height="168.5" rx="33.4" fill="none" stroke="url(#rim-l)" stroke-width="1.5"/>
    <rect x="42.5" y="42.5" width="715" height="165" rx="32" fill="none" stroke="#64748b" stroke-opacity="0.10" stroke-width="1"/>

    <g class="pill-l">
      <g clip-path="url(#clip-pill1-l)"><use xlink:href="#scene-l" href="#scene-l" filter="url(#refract-l)"/><rect x="248" y="60" width="96" height="30" rx="15" fill="#ffffff" fill-opacity="0.5"/></g>
      <rect x="248" y="60" width="96" height="30" rx="15" fill="none" stroke="#0f172a" stroke-opacity="0.18" stroke-width="1"/>
      <text x="288" y="79" fill="#0f172a" text-anchor="middle">Ventures</text>
      <path d="M320 73 l4 4 l4 -4" fill="none" stroke="#0d9488" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>

      <g clip-path="url(#clip-pill2-l)"><use xlink:href="#scene-l" href="#scene-l" filter="url(#refract-l)"/><rect x="352" y="60" width="96" height="30" rx="15" fill="#ffffff" fill-opacity="0.5"/></g>
      <rect x="352" y="60" width="96" height="30" rx="15" fill="none" stroke="#0f172a" stroke-opacity="0.18" stroke-width="1"/>
      <text x="400" y="79" fill="#0f172a" text-anchor="middle">Research</text>

      <g clip-path="url(#clip-pill3-l)"><use xlink:href="#scene-l" href="#scene-l" filter="url(#refract-l)"/><rect x="456" y="60" width="96" height="30" rx="15" fill="#ffffff" fill-opacity="0.5"/></g>
      <rect x="456" y="60" width="96" height="30" rx="15" fill="none" stroke="#0f172a" stroke-opacity="0.18" stroke-width="1"/>
      <text x="496" y="79" fill="#0f172a" text-anchor="middle">Connect</text>
      <path d="M528 73 l4 4 l4 -4" fill="none" stroke="#9333ea" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
    </g>

    <text x="400" y="147" text-anchor="middle" class="name-l" font-size="31" fill="#0f172a">MUHAMMAD ASJAD REHMAN</text>
    <text x="400" y="173" text-anchor="middle" class="sub-l" fill="#0f766e">AUTONOMOUS SYSTEMS &#183; ETHICAL SUPPLY CHAINS &#183; FAITH-CENTERED SOFTWARE</text>
    <text x="400" y="195" text-anchor="middle" class="tag-l" fill="#475569">Three ventures built from zero &#8212; securely, cleanly, and consciously.</text>
  </g>
</svg>
