<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 380 120" width="380" height="120" role="img" aria-label="Confer">
  <defs>
    <linearGradient id="sky-conferd" x1="0" y1="0" x2="0.5" y2="1"><stop offset="0" stop-color="#070c16"/><stop offset="1" stop-color="#0e1526"/></linearGradient>
    <radialGradient id="b1-conferd"><stop offset="0" stop-color="#c084fc" stop-opacity="0.8"/><stop offset="1" stop-color="#c084fc" stop-opacity="0"/></radialGradient>
    <radialGradient id="b2-conferd"><stop offset="0" stop-color="#f472b6" stop-opacity="0.62"/><stop offset="1" stop-color="#f472b6" stop-opacity="0"/></radialGradient>
    <radialGradient id="b3-conferd"><stop offset="0" stop-color="#c084fc" stop-opacity="0.62"/><stop offset="1" stop-color="#c084fc" stop-opacity="0"/></radialGradient>
    <g id="scene-conferd">
      <rect width="380" height="120" fill="url(#sky-conferd)"/>
      <circle cx="60" cy="80" r="120" fill="url(#b1-conferd)"/>
      <circle cx="330" cy="30" r="130" fill="url(#b2-conferd)"/>
      <circle cx="230" cy="110" r="95" fill="url(#b3-conferd)"/>
    </g>
    <filter id="refract-conferd" x="-15%" y="-15%" width="130%" height="130%" color-interpolation-filters="sRGB">
      <feTurbulence type="fractalNoise" baseFrequency="0.013 0.019" numOctaves="2" seed="13" result="n"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.1" result="f"/>
      <feDisplacementMap in="f" in2="n" scale="15" xChannelSelector="R" yChannelSelector="G" result="dm"/>
      <feComponentTransfer in="dm"><feFuncR type="linear" slope="1.10" intercept="0.02"/><feFuncG type="linear" slope="1.10" intercept="0.02"/><feFuncB type="linear" slope="1.12" intercept="0.03"/></feComponentTransfer>
    </filter>
    <filter id="sh-conferd" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#01030a" flood-opacity="0.5"/>
    </filter>
    <clipPath id="panel-conferd"><rect x="7" y="7" width="366" height="106" rx="20"/></clipPath>
    <clipPath id="ic-conferd"><circle cx="44" cy="60" r="22"/></clipPath>
    <linearGradient id="tint-conferd" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#ffffff" stop-opacity="0.13"/><stop offset="0.5" stop-color="#ffffff" stop-opacity="0.035"/><stop offset="1" stop-color="#0b1020" stop-opacity="0.10"/></linearGradient>
    <linearGradient id="rim-conferd" x1="0" y1="0" x2="0.8" y2="1"><stop offset="0" stop-color="#ffffff" stop-opacity="0.85"/><stop offset="0.45" stop-color="#ffffff" stop-opacity="0.18"/><stop offset="1" stop-color="#f472b6" stop-opacity="0.42"/></linearGradient>
    <linearGradient id="sheen-conferd" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#fff" stop-opacity="0.14"/><stop offset="0.5" stop-color="#fff" stop-opacity="0"/></linearGradient>
  </defs>

  <use xlink:href="#scene-conferd" href="#scene-conferd"/>

  <rect x="7" y="7" width="366" height="106" rx="20" fill="#04060b" opacity="0.4" filter="url(#sh-conferd)"/>
  <g clip-path="url(#panel-conferd)">
    <use xlink:href="#scene-conferd" href="#scene-conferd" filter="url(#refract-conferd)"/>
    <rect x="7" y="7" width="366" height="106" rx="20" fill="url(#tint-conferd)"/>
    <path d="M7 27 A20 20 0 0 1 27 7 H180 L120 113 H27 A20 20 0 0 1 7 93 Z" fill="url(#sheen-conferd)"/>
  </g>
  <rect x="7.4" y="8" width="365" height="105" rx="19.6" fill="none" stroke="#c084fc" stroke-opacity="0.20" stroke-width="0.8"/>
  <rect x="7.8" y="7.2" width="364" height="105" rx="19.6" fill="none" stroke="#f472b6" stroke-opacity="0.18" stroke-width="0.8"/>
  <rect x="7.6" y="7.6" width="365" height="105" rx="19.4" fill="none" stroke="url(#rim-conferd)" stroke-width="1.4"/>

  <!-- icon lens -->
  <g clip-path="url(#ic-conferd)"><use xlink:href="#scene-conferd" href="#scene-conferd" filter="url(#refract-conferd)"/><circle cx="44" cy="60" r="22" fill="#c084fc" fill-opacity="0.14"/></g>
  <circle cx="44" cy="60" r="22" fill="none" stroke="#ffffff" stroke-opacity="0.28" stroke-width="1.2"/>
  <g transform="translate(32,48)" color="#c084fc">
    <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z" fill="currentColor"/>
    <path d="M12 7v6M9 10h6" stroke="#fff" stroke-width="1.5" stroke-linecap="round" opacity="0.95"/></g>

  <!-- content -->
  <text x="82" y="49" fill="#f4f8ff" font-family="system-ui,-apple-system,'Segoe UI',Roboto,sans-serif" font-weight="700" font-size="15">Confer</text>
  <g>
    <rect x="299" y="39" width="66" height="20" rx="10" fill="#ffffff" fill-opacity="0.10" stroke="#c084fc" stroke-opacity="0.55" stroke-width="1"/>
    <circle cx="313" cy="49" r="2.6" fill="#c084fc"/>
    <text x="322" y="52.5" fill="#c084fc" font-family="system-ui,-apple-system,sans-serif" font-weight="800" font-size="9" letter-spacing="0.5">LIVE</text>
  </g>
  <text x="82" y="72" fill="#9aa7b8" font-family="system-ui,-apple-system,sans-serif" font-size="10.5">Donation infrastructure for communities —</text>
  <text x="82" y="86" fill="#9aa7b8" font-family="system-ui,-apple-system,sans-serif" font-size="10.5">checkout &amp; iPad kiosk flow.</text>
  <text x="82" y="104" fill="#c084fc" font-family="system-ui,-apple-system,sans-serif" font-size="9.5" font-weight="600">Next.js · React · .NET MAUI · Supabase</text>
</svg>
