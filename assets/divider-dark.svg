<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 400 18" width="100%" height="18" role="presentation">
  <defs>
    <linearGradient id="line-d" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#2dd4bf" stop-opacity="0"/>
      <stop offset="0.18" stop-color="#2dd4bf" stop-opacity="0.55"/>
      <stop offset="0.5" stop-color="#c084fc" stop-opacity="0.95"/>
      <stop offset="0.82" stop-color="#2dd4bf" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#2dd4bf" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="gem-d" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#2dd4bf"/>
      <stop offset="0.5" stop-color="#c084fc"/>
      <stop offset="1" stop-color="#38bdf8"/>
    </linearGradient>
    <linearGradient id="drim-d" x1="0" y1="0" x2="0.6" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.85"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0.15"/>
      <stop offset="1" stop-color="#c084fc" stop-opacity="0.5"/>
    </linearGradient>
    <linearGradient id="dtint-d" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#0b1020" stop-opacity="0.12"/>
    </linearGradient>
    <filter id="drefract-d" x="-40%" y="-40%" width="180%" height="180%" color-interpolation-filters="sRGB">
      <feTurbulence type="fractalNoise" baseFrequency="0.04 0.08" numOctaves="2" seed="4" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="5" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <clipPath id="dpill-d"><rect x="156" y="2" width="88" height="14" rx="7"/></clipPath>
  </defs>

  <rect x="0" y="8" width="400" height="2" fill="url(#line-d)"/>
  <circle cx="132" cy="9" r="2" fill="#2dd4bf" opacity="0.85"/>
  <circle cx="268" cy="9" r="2" fill="#2dd4bf" opacity="0.85"/>

  <g clip-path="url(#dpill-d)">
    <rect x="156" y="2" width="88" height="14" fill="url(#gem-d)" opacity="0.9" filter="url(#drefract-d)"/>
    <rect x="156" y="2" width="88" height="14" fill="url(#dtint-d)"/>
  </g>
  <rect x="156.5" y="2.5" width="87" height="13" rx="6.5" fill="none" stroke="url(#drim-d)" stroke-width="1"/>
  <circle cx="200" cy="9" r="1.6" fill="#ffffff" opacity="0.95"/>
</svg>
