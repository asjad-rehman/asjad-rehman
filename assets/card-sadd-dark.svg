<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 380 120" width="380" height="120" role="img" aria-label="Sadd">
  <defs>
    <linearGradient id="sky-saddd" x1="0" y1="0" x2="0.5" y2="1"><stop offset="0" stop-color="#070c16"/><stop offset="1" stop-color="#0e1526"/></linearGradient>
    <radialGradient id="b1-saddd"><stop offset="0" stop-color="#818cf8" stop-opacity="0.8"/><stop offset="1" stop-color="#818cf8" stop-opacity="0"/></radialGradient>
    <radialGradient id="b2-saddd"><stop offset="0" stop-color="#22d3ee" stop-opacity="0.62"/><stop offset="1" stop-color="#22d3ee" stop-opacity="0"/></radialGradient>
    <radialGradient id="b3-saddd"><stop offset="0" stop-color="#818cf8" stop-opacity="0.62"/><stop offset="1" stop-color="#818cf8" stop-opacity="0"/></radialGradient>
    <g id="scene-saddd">
      <rect width="380" height="120" fill="url(#sky-saddd)"/>
      <circle cx="60" cy="80" r="120" fill="url(#b1-saddd)"/>
      <circle cx="330" cy="30" r="130" fill="url(#b2-saddd)"/>
      <circle cx="230" cy="110" r="95" fill="url(#b3-saddd)"/>
    </g>
    <filter id="refract-saddd" x="-15%" y="-15%" width="130%" height="130%" color-interpolation-filters="sRGB">
      <feTurbulence type="fractalNoise" baseFrequency="0.013 0.019" numOctaves="2" seed="11" result="n"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.1" result="f"/>
      <feDisplacementMap in="f" in2="n" scale="15" xChannelSelector="R" yChannelSelector="G" result="dm"/>
      <feComponentTransfer in="dm"><feFuncR type="linear" slope="1.10" intercept="0.02"/><feFuncG type="linear" slope="1.10" intercept="0.02"/><feFuncB type="linear" slope="1.12" intercept="0.03"/></feComponentTransfer>
    </filter>
    <filter id="sh-saddd" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#01030a" flood-opacity="0.5"/>
    </filter>
    <clipPath id="panel-saddd"><rect x="7" y="7" width="366" height="106" rx="20"/></clipPath>
    <clipPath id="ic-saddd"><circle cx="44" cy="60" r="22"/></clipPath>
    <linearGradient id="tint-saddd" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#ffffff" stop-opacity="0.13"/><stop offset="0.5" stop-color="#ffffff" stop-opacity="0.035"/><stop offset="1" stop-color="#0b1020" stop-opacity="0.10"/></linearGradient>
    <linearGradient id="rim-saddd" x1="0" y1="0" x2="0.8" y2="1"><stop offset="0" stop-color="#ffffff" stop-opacity="0.85"/><stop offset="0.45" stop-color="#ffffff" stop-opacity="0.18"/><stop offset="1" stop-color="#22d3ee" stop-opacity="0.42"/></linearGradient>
    <linearGradient id="sheen-saddd" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#fff" stop-opacity="0.14"/><stop offset="0.5" stop-color="#fff" stop-opacity="0"/></linearGradient>
  </defs>

  <use xlink:href="#scene-saddd" href="#scene-saddd"/>

  <rect x="7" y="7" width="366" height="106" rx="20" fill="#04060b" opacity="0.4" filter="url(#sh-saddd)"/>
  <g clip-path="url(#panel-saddd)">
    <use xlink:href="#scene-saddd" href="#scene-saddd" filter="url(#refract-saddd)"/>
    <rect x="7" y="7" width="366" height="106" rx="20" fill="url(#tint-saddd)"/>
    <path d="M7 27 A20 20 0 0 1 27 7 H180 L120 113 H27 A20 20 0 0 1 7 93 Z" fill="url(#sheen-saddd)"/>
  </g>
  <rect x="7.4" y="8" width="365" height="105" rx="19.6" fill="none" stroke="#818cf8" stroke-opacity="0.20" stroke-width="0.8"/>
  <rect x="7.8" y="7.2" width="364" height="105" rx="19.6" fill="none" stroke="#22d3ee" stroke-opacity="0.18" stroke-width="0.8"/>
  <rect x="7.6" y="7.6" width="365" height="105" rx="19.4" fill="none" stroke="url(#rim-saddd)" stroke-width="1.4"/>

  <!-- icon lens -->
  <g clip-path="url(#ic-saddd)"><use xlink:href="#scene-saddd" href="#scene-saddd" filter="url(#refract-saddd)"/><circle cx="44" cy="60" r="22" fill="#818cf8" fill-opacity="0.14"/></g>
  <circle cx="44" cy="60" r="22" fill="none" stroke="#ffffff" stroke-opacity="0.28" stroke-width="1.2"/>
  <g transform="translate(32,48)" color="#818cf8">
    <rect x="5" y="2" width="14" height="20" rx="3" fill="none" stroke="currentColor" stroke-width="2"/>
    <line x1="8" y1="5" x2="16" y2="5" stroke="currentColor" stroke-width="1.5"/>
    <circle cx="12" cy="18" r="1.5" fill="currentColor"/>
    <path d="M9 9h6v5H9V9z" fill="currentColor" opacity="0.7"/>
    <path d="M12 7.5v1.5" stroke="currentColor" stroke-width="1"/></g>

  <!-- content -->
  <text x="82" y="49" fill="#f4f8ff" font-family="system-ui,-apple-system,'Segoe UI',Roboto,sans-serif" font-weight="700" font-size="15">Sadd</text>
  <g>
    <rect x="299" y="39" width="66" height="20" rx="10" fill="#ffffff" fill-opacity="0.10" stroke="#818cf8" stroke-opacity="0.55" stroke-width="1"/>
    <circle cx="313" cy="49" r="2.6" fill="#818cf8"/>
    <text x="322" y="52.5" fill="#818cf8" font-family="system-ui,-apple-system,sans-serif" font-weight="800" font-size="9" letter-spacing="0.5">LIVE</text>
  </g>
  <text x="82" y="72" fill="#9aa7b8" font-family="system-ui,-apple-system,sans-serif" font-size="10.5">A focus app built with intention — a</text>
  <text x="82" y="86" fill="#9aa7b8" font-family="system-ui,-apple-system,sans-serif" font-size="10.5">deliberate barrier to infinite feeds.</text>
  <text x="82" y="104" fill="#818cf8" font-family="system-ui,-apple-system,sans-serif" font-size="9.5" font-weight="600">SwiftUI · iOS · Supabase · RevenueCat</text>
</svg>
